<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
      }
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 96px;
        background:
          radial-gradient(1200px 520px at 50% -12%, rgba(130, 170, 255, 0.14), transparent 60%),
          #0f111a;
        color: #d6deeb;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      .kicker {
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        font-size: 22px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #8f93a2;
        margin-bottom: 34px;
      }
      h1 {
        font-size: 72px;
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      h1 .mark {
        color: #82aaff;
      }
      .foot {
        margin-top: 40px;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
        font-size: 26px;
        color: #8f93a2;
      }
      .foot b {
        color: #d6deeb;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="kicker">&#9820; rook &nbsp;&middot;&nbsp; documentation</div>
    <h1><span class="mark">&#9820;</span> rook docs</h1>
    <div class="foot">
      Install &middot; configure &middot; understand. &nbsp; <b>docs.rookide.com</b>
    </div>
  </body>
</html>
